name: Huggingphaze CI

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Verify environment
        run: |
          python -c "import pandas, yaml, requests, nbformat; print('Environment OK')"

      - name: Generate notebook
        run: |
          python generate_notebook.py

      - name: Commit generated notebook
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add notebooks/
          git commit -m "Auto-generated notebook update" || echo "No changes to commit"
          git push
