name: Huggingphaze CI

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install libraries
        run: |
          pip install -r requirements.txt

      - name: Test environment
        run: |
          python -c "import pandas, yaml, requests; print('Libraries loaded successfully')"
